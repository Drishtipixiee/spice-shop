version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/shop.db
      - ADMIN_EMAIL=admin@spiceshop.in
      - ADMIN_PASSWORD=Admin@1234
      - JWT_SECRET=supersecretjwtkey2025changeme
      - ALLOWED_ORIGIN=http://localhost:3000
      - WHATSAPP_NUMBER=919999999999
      - ENABLE_RAZORPAY=false
    command: sh -c 'python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000'

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WHATSAPP_NUMBER=919999999999
      - NEXT_PUBLIC_ENABLE_RAZORPAY=false
    depends_on:
      - backend
