<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Enterprise Admin</title>
<link rel="stylesheet" href="/admin/assets/css/admin.css">
<style>
  body.login-body {
    background:
      radial-gradient(circle at top, rgba(226, 58, 69, 0.12), transparent 35%),
      linear-gradient(180deg, #fff8f2 0%, #f8efe3 100%) !important;
  }
  .login-container {
    border: 1px solid rgba(226, 58, 69, 0.12) !important;
    box-shadow: 0 20px 40px rgba(226, 58, 69, 0.08) !important;
  }
</style>
</head>
<body class="login-body" style="background: linear-gradient(180deg, #fff8f2 0%, #f8efe3 100%);">

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">SpiceShop</div>
    <div class="login-sub">Secure Enterprise Portal</div>
  </div>
  
  <div class="form-group">
    <label class="form-label">Admin Email</label>
    <input type="email" id="email" class="form-control" placeholder="admin@spiceshop.in" value="admin@spiceshop.in">
  </div>
  
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" id="password" class="form-control" placeholder="Enter password" value="Admin@1234">
  </div>
  
  <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="doLogin()">Authenticate securely</button>
</div>

<script type="module" src="/admin/assets/js/api.js"></script>
<script>
async function doLogin() {
  const e = document.getElementById('email').value;
  const p = document.getElementById('password').value;
  await api.login(e, p);
}
</script>
</body>
</html>
