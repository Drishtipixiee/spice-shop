<style>
:root{
  --saffron:#FF6B00;--gold:#FFC200;--red:#C0392B;--cream:#f8fafc;
  --dark:#0f172a;--brown:#8B4513;--text:#333;--gray:#666;--lgray:#f5f5f5;
  --dairy-bg:#e8f4fd;--dairy-accent:#7c3aed;--dairy-dark:#5b21b6;
  --shadow:0 4px 20px rgba(44,24,16,.12);--shadow-lg:0 8px 40px rgba(44,24,16,.18);
  --radius:16px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;outline:none}
.hindi{font-family:'Tiro Devanagari Hindi',serif}

/* TICKER */
.ticker{background:linear-gradient(90deg,var(--dairy-dark),var(--dairy-accent),var(--dairy-dark));color:#fff;
  padding:8px 0;overflow:hidden;font-size:.8rem;font-weight:500}
.ticker-track{display:flex;gap:40px;white-space:nowrap;animation:ticker 30s linear infinite}
.ticker-track span{flex-shrink:0}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* NAVBAR */
nav{position:sticky;top:0;z-index:900;background:rgba(255,248,240,.96);
  backdrop-filter:blur(12px);border-bottom:2px solid rgba(74,144,217,.15);
  box-shadow:0 2px 20px rgba(74,144,217,.1)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;font-weight:800;color:var(--dairy-dark)}
.logo .logo-icon{font-size:1.8rem}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{font-weight:500;color:var(--dark);transition:.2s;font-size:.95rem;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;
  background:var(--dairy-accent);transition:.3s}
.nav-links a:hover::after{width:100%}
.nav-links a:hover{color:var(--dairy-accent)}
.nav-right{display:flex;align-items:center;gap:16px}
.cart-btn{position:relative;background:var(--dairy-dark);color:#fff;border:none;
  padding:10px 18px;border-radius:30px;font-weight:600;font-size:.9rem;
  display:flex;align-items:center;gap:8px;transition:.2s;cursor:pointer}
.cart-btn:hover{background:var(--dairy-accent);transform:translateY(-1px)}
.cart-count{background:#fff;color:var(--dairy-dark);border-radius:50%;
  width:20px;height:20px;display:grid;place-items:center;font-size:.72rem;font-weight:700}
.burger{display:none;background:none;font-size:1.5rem;color:var(--dark);padding:6px}
.mobile-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);z-index:950}
.mobile-menu-inner{background:var(--cream);width:280px;height:100%;padding:24px;
  display:flex;flex-direction:column;gap:8px}
.mobile-menu.open{display:block}
.mobile-menu-inner a{padding:14px 16px;font-weight:600;border-bottom:1px solid rgba(74,144,217,.1);
  color:var(--dark);display:block}
.close-menu{align-self:flex-end;background:none;font-size:1.4rem;color:var(--dark);margin-bottom:12px}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;
  background:linear-gradient(135deg,#0f172a 0%,#5b21b6 40%,#7c3aed 100%);
  overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Ghee_in_a_bowl.jpg/1200px-Ghee_in_a_bowl.jpg') center/cover;
  opacity:.15;z-index:0;filter:blur(4px)}
.hero-particles{position:absolute;inset:0;z-index:1;overflow:hidden}
.particle{position:absolute;font-size:1.5rem;opacity:.35;animation:float-particle 8s ease-in-out infinite}
.particle:nth-child(1){left:8%;top:15%;animation-delay:0s;font-size:2rem}
.particle:nth-child(2){left:85%;top:20%;animation-delay:1.5s}
.particle:nth-child(3){left:15%;top:70%;animation-delay:3s;font-size:2.2rem}
.particle:nth-child(4){left:75%;top:65%;animation-delay:4.5s;font-size:1.8rem}
.particle:nth-child(5){left:45%;top:10%;animation-delay:2s}
.particle:nth-child(6){left:90%;top:80%;animation-delay:0.8s;font-size:1.3rem}
.particle:nth-child(7){left:5%;top:45%;animation-delay:3.5s;font-size:2.5rem}
.particle:nth-child(8){left:60%;top:85%;animation-delay:1.2s}
@keyframes float-particle{0%,100%{transform:translateY(0) rotate(0deg);opacity:.35}
  50%{transform:translateY(-30px) rotate(20deg);opacity:.6}}
.hero-content{position:relative;z-index:2;max-width:1280px;margin:0 auto;
  padding:80px 20px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-text{color:#fff}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 16px;
  border-radius:30px;font-size:.8rem;font-weight:600;margin-bottom:20px;backdrop-filter:blur(4px)}
.hero-title-hindi{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;line-height:1.1;
  background:linear-gradient(135deg,#fff 0%,#e0f2fe 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px}
.hero-title-en{font-size:clamp(.9rem,2vw,1.1rem);color:rgba(255,255,255,.9);
  font-weight:400;margin-bottom:24px;letter-spacing:.5px}
.hero-desc{font-size:clamp(.9rem,2vw,1.1rem);color:rgba(255,255,255,.85);
  line-height:1.7;margin-bottom:36px;max-width:480px}
.hero-cta{display:flex;gap:16px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;
  padding:14px 32px;border-radius:30px;font-weight:700;font-size:1rem;
  box-shadow:0 4px 20px rgba(29,78,216,.4);transition:.3s;border:none;cursor:pointer}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(29,78,216,.5)}
.btn-outline{background:transparent;color:#fff;padding:14px 32px;border-radius:30px;
  font-weight:600;font-size:1rem;border:2px solid rgba(255,255,255,.6);transition:.3s;cursor:pointer}
.btn-outline:hover{background:rgba(255,255,255,.15);border-color:#fff}
.hero-visual{display:flex;justify-content:center;align-items:center}
.hero-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:420px}
.hero-img-item{border-radius:var(--radius);overflow:hidden;position:relative;
  box-shadow:var(--shadow-lg);transition:.3s;background:#fff}
.hero-img-item:hover{transform:scale(1.03)}
.hero-img-item img{width:100%;height:160px;object-fit:cover}
.hero-img-item:first-child{grid-column:span 2;height:200px}
.hero-img-item:first-child img{height:200px}
.img-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));
  color:#fff;padding:12px;font-size:.8rem;font-weight:600}

/* TRUST BADGES */
.trust-strip{background:#fff;border-top:3px solid var(--dairy-accent);padding:20px}
.trust-inner{max-width:1280px;margin:0 auto;
  display:flex;justify-content:space-around;align-items:center;flex-wrap:wrap;gap:16px}
.trust-item{display:flex;align-items:center;gap:10px;font-size:.85rem;font-weight:600;color:var(--dark)}
.trust-icon{font-size:1.4rem}

/* SECTION COMMONS */
.section{padding:60px 20px}
.section-inner{max-width:1280px;margin:0 auto}
.section-head{text-align:center;margin-bottom:48px}
.section-head h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;color:var(--dark);
  margin-bottom:8px}
.section-head .sub{font-size:1rem;color:var(--gray);font-weight:400}
.section-head .hindi-sub{font-size:1.2rem;color:var(--dairy-accent);margin-bottom:4px}

/* CATEGORY TABS */
.category-section{background:#fff;padding:32px 20px 0;position:sticky;top:68px;z-index:800;
  box-shadow:0 2px 10px rgba(0,0,0,.06)}
.cat-tabs{max-width:1280px;margin:0 auto;
  display:flex;gap:8px;overflow-x:auto;padding-bottom:0;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:10px 20px;border-radius:30px 30px 0 0;font-weight:600;
  font-size:.88rem;cursor:pointer;transition:.2s;background:transparent;
  color:var(--gray);border:2px solid transparent;border-bottom:none;position:relative;bottom:-2px}
.cat-tab.active{background:var(--cream);color:var(--dairy-dark);border-color:rgba(74,144,217,.3)}
.cat-tab:hover{color:var(--dairy-accent)}
.cat-count{display:inline-block;background:var(--dairy-accent);color:#fff;
  border-radius:30px;padding:1px 7px;font-size:.7rem;margin-left:6px}

/* SEARCH BAR */
.search-bar{max-width:1280px;margin:24px auto 0;padding:0 20px}
.search-wrap{position:relative;max-width:480px}
.search-wrap input{width:100%;padding:12px 16px 12px 48px;border:2px solid rgba(74,144,217,.25);
  border-radius:30px;font-family:'Poppins',sans-serif;font-size:.95rem;
  background:#fff;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--dairy-accent);box-shadow:0 0 0 3px rgba(74,144,217,.1)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem}

/* PRODUCT GRID */
.products-section{background:var(--cream);padding:32px 20px 60px}
.products-inner{max-width:1280px;margin:0 auto}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px}
.product-card{background:#fff;border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);transition:.3s;position:relative;
  border:1px solid rgba(74,144,217,.08)}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.product-card.dairy{border-top:3px solid var(--dairy-accent)}
.product-card.spice{border-top:3px solid var(--saffron)}
.product-card.combo{border:2px solid var(--gold)}
.card-img{position:relative;overflow:hidden;height:200px;background:#fff;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
.product-card:hover .card-img img{transform:scale(1.08)}
.card-badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px}
.badge{padding:3px 10px;border-radius:30px;font-size:.7rem;font-weight:700;color:#fff}
.badge-bestseller{background:var(--saffron)}
.badge-new{background:var(--dairy-dark)}
.badge-organic{background:#27ae60}
.badge-sale{background:var(--gold);color:var(--dark)}
.badge-combo{background:linear-gradient(135deg,var(--gold),var(--saffron));color:#fff}
.wa-quick{position:absolute;bottom:10px;right:10px;background:#25D366;color:#fff;
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;opacity:0;transition:.3s;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.product-card:hover .wa-quick{opacity:1}
.card-body{padding:16px}
.card-category{font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.product-card.dairy .card-category{color:var(--dairy-accent)}
.product-card.spice .card-category{color:var(--saffron)}
.card-name{font-weight:700;font-size:1rem;color:var(--dark);margin-bottom:2px}
.card-name-hindi{font-size:.82rem;color:var(--gray);margin-bottom:8px;
  font-family:'Tiro Devanagari Hindi',serif}
.card-rating{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.stars{color:var(--gold);font-size:.85rem}
.review-count{font-size:.75rem;color:var(--gray)}
.card-price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-price{font-size:1.3rem;font-weight:800;color:var(--dark)}
.card-mrp{font-size:.82rem;color:var(--gray);text-decoration:line-through}
.card-save{font-size:.72rem;font-weight:700;color:#27ae60;background:#e8f5e9;
  padding:2px 8px;border-radius:30px}
.card-weight{font-size:.78rem;color:var(--gray);margin-bottom:12px}
.card-actions{display:flex;gap:8px}
.btn-cart{flex:1;background:linear-gradient(135deg,var(--dairy-accent),var(--dairy-dark));color:#fff;
  padding:10px;border-radius:var(--radius-sm);font-weight:600;font-size:.85rem;
  transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-cart:hover{opacity:.9;transform:scale(1.02)}
.btn-wa{background:#25D366;color:#fff;padding:10px 14px;border-radius:var(--radius-sm);
  font-size:1rem;transition:.2s;display:flex;align-items:center;justify-content:center}
.btn-wa:hover{background:#1ebe5d}

/* COMBO SECTION */
.combo-section{background:linear-gradient(135deg,#e0f2fe,#fff8f0);padding:60px 20px}
.combo-grid{max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px}
.combo-card{background:#fff;border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-lg);border:2px solid rgba(74,144,217,.4);position:relative}
.combo-card::before{content:'<i class="ph-fill ph-gift"></i>';position:absolute;top:-12px;right:16px;font-size:2rem;z-index:1}
.combo-img{height:220px;overflow:hidden;position:relative;background:#fff}
.combo-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
.combo-card:hover .combo-img img{transform:scale(1.05)}
.most-popular{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,var(--dairy-accent),var(--dairy-dark));
  color:#fff;padding:4px 14px;border-radius:30px;font-size:.75rem;font-weight:700;z-index:1}
.combo-body{padding:20px}
.combo-name{font-size:1.15rem;font-weight:800;color:var(--dark);margin-bottom:4px}
.combo-desc{font-size:.85rem;color:var(--gray);margin-bottom:12px;line-height:1.5}
.combo-price-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.combo-price{font-size:1.5rem;font-weight:800;color:var(--dairy-dark)}
.combo-original{font-size:1rem;color:var(--gray);text-decoration:line-through}
.combo-save{background:#e0f2fe;color:var(--dairy-dark);font-size:.78rem;font-weight:700;
  padding:3px 10px;border-radius:30px;border:1px solid var(--dairy-accent)}
.combo-timer{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--red);
  font-weight:600;margin-bottom:16px}
.combo-actions{display:flex;gap:10px}
.btn-combo{flex:1;background:linear-gradient(135deg,var(--dairy-accent),var(--dairy-dark));color:#fff;
  padding:12px;border-radius:var(--radius-sm);font-weight:700;font-size:.9rem;
  transition:.2s;border:none;cursor:pointer;text-align:center}
.btn-combo:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(29,78,216,.3)}

/* WHY US */
.why-section{background:linear-gradient(135deg,var(--dark) 0%,#1e3a8a 100%);
  padding:60px 20px;color:#fff}
.why-grid{max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
.why-card{text-align:center;padding:32px 20px;background:rgba(255,255,255,.06);
  border-radius:var(--radius);border:1px solid rgba(255,255,255,.2);transition:.3s}
.why-card:hover{background:rgba(255,255,255,.1);transform:translateY(-4px)}
.why-icon{font-size:2.5rem;margin-bottom:16px}
.why-num{font-size:2.5rem;font-weight:900;color:var(--gold);margin-bottom:4px}
.why-label{font-size:.9rem;color:rgba(255,255,255,.8);font-weight:500}

/* REVIEWS */
.reviews-section{background:var(--cream);padding:60px 20px;overflow:hidden}
.reviews-track-wrap{max-width:1280px;margin:0 auto;overflow:hidden}
.reviews-track{display:flex;gap:20px;animation:scroll-reviews 40s linear infinite}
.reviews-track:hover{animation-play-state:paused}
.review-card{flex-shrink:0;width:320px;background:#fff;border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);border-left:4px solid var(--dairy-accent)}
.reviewer{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;flex-shrink:0}
.reviewer-info h4{font-size:.9rem;font-weight:700;color:var(--dark)}
.reviewer-info p{font-size:.78rem;color:var(--gray)}
.review-stars{color:var(--gold);font-size:.9rem;margin-bottom:8px}
.review-text{font-size:.88rem;color:var(--text);line-height:1.6}
@keyframes scroll-reviews{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HOW TO ORDER */
.how-section{background:#fff;padding:60px 20px}
.how-steps{max-width:900px;margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);gap:40px;position:relative}
.how-steps::before{content:'';position:absolute;top:48px;left:16%;right:16%;
  height:2px;background:linear-gradient(90deg,var(--dairy-accent),var(--saffron));z-index:0}
.how-step{text-align:center;position:relative;z-index:1}
.step-num{width:72px;height:72px;background:linear-gradient(135deg,var(--dairy-accent),var(--saffron));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;margin:0 auto 16px;box-shadow:0 4px 20px rgba(74,144,217,.3)}
.step-title{font-size:1.05rem;font-weight:700;color:var(--dark);margin-bottom:6px}
.step-desc{font-size:.85rem;color:var(--gray);line-height:1.5}
.cod-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
  border:1px solid #27ae60;color:#2e7d32;padding:10px 20px;border-radius:30px;
  font-weight:600;font-size:.9rem;margin-top:32px}

/* PINCODE */
.pincode-section{background:linear-gradient(135deg,var(--dairy-dark),var(--dairy-accent));
  padding:40px 20px;color:#fff;text-align:center}
.pincode-form{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.pincode-input{padding:12px 20px;border-radius:30px;border:none;
  font-family:'Poppins',sans-serif;font-size:1rem;width:220px;outline:none}
.pin-btn{background:var(--dark);color:#fff;padding:12px 28px;
  border-radius:30px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:.2s}
.pin-btn:hover{background:#fff;color:var(--dark)}
.pin-result{margin-top:12px;font-weight:600;font-size:1rem}
.pin-result.ok{color:var(--gold)}
.pin-result.no{color:#ffcdd2}

/* TRUST */
.trust-section{background:var(--dark);padding:50px 20px;color:#fff}
.trust-grid{max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:repeat(4,1fr);gap:28px}
.trust-card{text-align:center;padding:28px 16px;background:rgba(255,255,255,.05);
  border-radius:var(--radius);border:1px solid rgba(255,255,255,.15)}
.trust-card-icon{font-size:2.2rem;margin-bottom:12px}
.trust-card h4{font-size:.95rem;font-weight:700;color:var(--dairy-accent);margin-bottom:8px}
.trust-card p{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.5}
.payment-logos{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.pay-logo{background:rgba(255,255,255,.12);padding:6px 16px;border-radius:var(--radius-sm);
  font-size:.78rem;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.2)}

/* FOOTER */
footer{background
