<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Indian Dairy & Spices</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f172a; --bg: #f1f5f9; --surface: #ffffff;
  --border: #e2e8f0; --text: #334155; --blue: #3b82f6; --orange: #f97316; --green: #10b981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); }
.header { background:var(--primary); color:#fff; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:1.4rem; font-weight:700; display:flex; align-items:center; gap:10px;}
.header-right a { color:#fff; text-decoration:none; opacity:0.8; font-size:0.9rem; margin-left:20px;}
.header-right a:hover { opacity:1; }

.tabs { display:flex; gap:10px; background:var(--surface); padding:10px 40px; border-bottom:1px solid var(--border); }
.tab { padding:10px 20px; cursor:pointer; font-weight:600; border-radius:8px; border:1px solid transparent; }
.tab.active { background:var(--bg); border-color:var(--border); color:var(--blue); }

.container { max-width:1200px; margin:40px auto; padding:0 20px; display:none; }
.container.active { display:block; }

.stat-cards { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; margin-bottom:30px; }
.stat-card { background:var(--surface); padding:24px; border-radius:12px; border:1px solid var(--border); }
.stat-title { font-size:0.85rem; text-transform:uppercase; font-weight:700; color:#64748b; margin-bottom:8px; }
.stat-val { font-size:2rem; font-weight:800; color:var(--primary); }

.table-wrap { width:100%; background:var(--surface); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; text-align:left; }
th { background:#f8fafc; padding:16px 20px; font-size:0.85rem; font-weight:700; color:#64748b; text-transform:uppercase; border-bottom:1px solid var(--border); }
td { padding:16px 20px; border-bottom:1px solid var(--border); font-size:0.95rem; vertical-align:top; }
tr:hover { background:#f8fafc; }

.status-badge { display:inline-block; padding:4px 12px; border-radius:30px; font-size:0.75rem; font-weight:700; }
.status-received { background:#dbeafe; color:#1d4ed8; }
.status-shipped { background:#fef3c7; color:#b45309; }
.status-delivered { background:#d1fae5; color:#047857; }

.btn { padding:6px 12px; border:none; border-radius:6px; font-family:inherit; font-weight:600; cursor:pointer; font-size:0.8rem; }
.btn-ship { background:var(--orange); color:#fff; margin-bottom:4px;}
.btn-deliver { background:var(--green); color:#fff; margin-bottom:4px;}
.btn-delete { background:#ef4444; color:#fff; }
.btn-edit { background:var(--blue); color:#fff; }
.btn-add { background:var(--primary); color:#fff; padding:10px 20px; font-size:1rem; margin-bottom:20px; float:right; }

.empty { padding:60px; text-align:center; color:#94a3b8; font-size:1.1rem; }

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:100; }
.modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#fff; padding:30px; border-radius:12px; width:400px; display:none; z-index:101; }
.modal.open, .overlay.open { display:block; }
.modal h3 { margin-bottom:20px; }
.modal input, .modal select { width:100%; padding:10px; margin-bottom:16px; border:1px solid #ccc; border-radius:6px; font-family:inherit; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Super Admin Dashboard</h1>
  <div class="header-right"><a href="/index.html">← Back to Store</a></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('orders', this)">📦 Live Orders</div>
  <div class="tab" onclick="switchTab('products', this)">📋 Product Manager (Edit Photos)</div>
</div>

<!-- ORDERS -->
<div class="container active" id="ordersTab">
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-title">Total Orders</div>
      <div class="stat-val" id="statOrders">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-val" id="statRev">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Pending</div>
      <div class="stat-val" id="statPending">0</div>
    </div>
  </div>
  
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Payment</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>
</div>

<!-- PRODUCTS -->
<div class="container" id="productsTab">
  <button class="btn btn-add" onclick="openProductModal()">+ Add New Product</button>
  <div class="table-wrap" style="clear:both">
    <table>
      <thead>
        <tr><th>Image</th><th>Name</th><th>Category</th><th>Price (₹)</th><th>Actions</th></tr>
      </thead>
      <tbody id="productsTable"></tbody>
    </table>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="prodModal">
  <h3 id="modalTitle">Edit Product</h3>
  <input type="hidden" id="pId">
  <label>Product Name (English)</label>
  <input type="text" id="pName">
  <label>Category</label>
  <select id="pCat">
    <option value="dairy">Dairy</option>
    <option value="spice">Spice</option>
    <option value="cake">Cake</option>
  </select>
  <label>Price (₹)</label>
  <input type="number" id="pPrice">
  <label>Photo URL (Image Link)</label>
  <input type="text" id="pImg" placeholder="https://...">
  <button class="btn btn-add" style="float:none;width:100%" onclick="saveProduct()">Save Product</button>
</div>

<script>
let orders = [];
let products = [];

function loadData() {
  orders = JSON.parse(localStorage.getItem('zeptoDbOrders') || '[]');
  products = JSON.parse(localStorage.getItem('zeptoDbProducts') || '[]');
  
  // If products empty, wait for frontend to initialize or set empty
  
  renderOrders();
  renderProducts();
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
  document.getElementById(tabId + 'Tab').classList.add('active');
  btn.classList.add('active');
}

// ORDERS
function renderOrders() {
  const tbody = document.getElementById('ordersTable');
  document.getElementById('statOrders').textContent = orders.length;
  document.getElementById('statRev').textContent = '₹' + orders.reduce((s,o)=>s+o.total,0);
  document.getElementById('statPending').textContent = orders.filter(o=>o.status==='Received').length;

  if(orders.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No orders found.</td></tr>`; return; }

  tbody.innerHTML = orders.map(o => {
    let sClass = 'status-received';
    if(o.status === 'Shipped') sClass = 'status-shipped';
    if(o.status === 'Delivered') sClass = 'status-delivered';

    let actionBtns = '';
    if(o.status === 'Received') actionBtns += `<button class="btn btn-ship" onclick="updateStatus('${o.id}', 'Shipped')">Mark Shipped</button><br>`;
    if(o.status === 'Shipped') actionBtns += `<button class="btn btn-deliver" onclick="updateStatus('${o.id}', 'Delivered')">Mark Delivered</button><br>`;
    actionBtns += `<button class="btn btn-delete" onclick="deleteOrder('${o.id}')">Delete</button>`;

    const itemsHtml = o.items.map(i => \`• \${i.name} (\${i.qty}x)\`).join('<br>');

    return `
      <tr>
        <td><strong>\${o.id}</strong><br><span style="font-size:0.8rem">\${o.time}</span></td>
        <td><strong>\${o.customer.name}</strong><br>📞 \${o.customer.phone}<br><span style="font-size:0.85rem">\${o.customer.addr}</span></td>
        <td style="font-size:0.85rem">\${itemsHtml}</td>
        <td><strong>₹\${o.total}</strong><br><span style="font-size:0.8rem">\${o.method}</span></td>
        <td><span class="status-badge \${sClass}">\${o.status}</span></td>
        <td>\${actionBtns}</td>
      </tr>`;
  }).join('');
}
function updateStatus(id, st) { orders.find(x=>x.id===id).status = st; localStorage.setItem('zeptoDbOrders', JSON.stringify(orders)); renderOrders(); }
function deleteOrder(id) { orders = orders.filter(x=>x.id!==id); localStorage.setItem('zeptoDbOrders', JSON.stringify(orders)); renderOrders(); }

// PRODUCTS
function renderProducts() {
  const tbody = document.getElementById('productsTable');
  if(products.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="empty">No products. Open the main site once to initialize.</td></tr>`; return; }
  
  tbody.innerHTML = products.map(p => `
    <tr>
      <td><img src="\${p.img}" width="50" height="50" style="border-radius:8px;object-fit:cover"></td>
      <td><strong>\${p.name}</strong></td>
      <td style="text-transform:capitalize">\${p.cat}</td>
      <td>₹\${p.price}</td>
      <td>
        <button class="btn btn-edit" onclick="editProduct(\${p.id})">Edit Photo/Price</button>
        <button class="btn btn-delete" onclick="deleteProduct(\${p.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function openProductModal(id = null) {
  const isNew = id === null;
  document.getElementById('modalTitle').textContent = isNew ? "Add Product" : "Edit Product";
  
  if(!isNew) {
    const p = products.find(x => x.id === id);
    document.getElementById('pId').value = p.id;
    document.getElementById('pName').value = p.name;
    document.getElementById('pCat').value = p.cat;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pImg').value = p.img;
  } else {
    document.getElementById('pId').value = "";
    document.getElementById('pName').value = "";
    document.getElementById('pPrice').value = "";
    document.getElementById('pImg').value = "";
  }
  
  document.getElementById('overlay').classList.add('open');
  document.getElementById('prodModal').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('prodModal').classList.remove('open');
}

function saveProduct() {
  const idStr = document.getElementById('pId').value;
  const name = document.getElementById('pName').value;
  const cat = document.getElementById('pCat').value;
  const price = parseInt(document.getElementById('pPrice').value);
  const img = document.getElementById('pImg').value;
  
  if(!name || !img) { alert("Name and Image URL are required."); return; }
  
  if(idStr) { // edit
    const p = products.find(x => x.id === parseInt(idStr));
    p.name = name; p.cat = cat; p.price = price; p.img = img;
  } else { // new
    const newId = products.length > 0 ? Math.max(...products.map(x=>x.id)) + 1 : 1;
    products.push({ id: newId, name, hindi:name, cat, price, mrp:price+50, weight:"1 pc", img, badges:[], rating:5, reviews:0, tags:[] });
  }
  
  localStorage.setItem('zeptoDbProducts', JSON.stringify(products));
  renderProducts();
  closeModal();
}

function deleteProduct(id) {
  if(!confirm("Are you sure?")) return;
  products = products.filter(x => x.id !== id);
  localStorage.setItem('zeptoDbProducts', JSON.stringify(products));
  renderProducts();
}

setInterval(() => {
  orders = JSON.parse(localStorage.getItem('zeptoDbOrders') || '[]');
  renderOrders();
}, 2000);

loadData();
</script>
</body>
</html>
