<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Indian Dairy & Spices</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f172a;
  --bg: #f1f5f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #334155;
  --blue: #3b82f6;
  --orange: #f97316;
  --green: #10b981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); }
.header { background:var(--primary); color:#fff; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:1.4rem; font-weight:700; display:flex; align-items:center; gap:10px;}
.header-right a { color:#fff; text-decoration:none; opacity:0.8; font-size:0.9rem; }
.header-right a:hover { opacity:1; }

.container { max-width:1200px; margin:40px auto; padding:0 20px; }
.stat-cards { display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; margin-bottom:30px; }
.stat-card { background:var(--surface); padding:24px; border-radius:12px; border:1px solid var(--border); box-shadow:0 4px 6px rgba(0,0,0,0.02); }
.stat-title { font-size:0.85rem; text-transform:uppercase; font-weight:700; color:#64748b; margin-bottom:8px; }
.stat-val { font-size:2rem; font-weight:800; color:var(--primary); }

.orders-table { width:100%; background:var(--surface); border-radius:12px; overflow:hidden; border:1px solid var(--border); border-collapse:collapse; text-align:left; }
.orders-table th { background:#f8fafc; padding:16px 20px; font-size:0.85rem; font-weight:700; color:#64748b; text-transform:uppercase; border-bottom:1px solid var(--border); }
.orders-table td { padding:16px 20px; border-bottom:1px solid var(--border); font-size:0.95rem; vertical-align:top; }
.orders-table tr:hover { background:#f8fafc; }

.status-badge { display:inline-block; padding:4px 12px; border-radius:30px; font-size:0.75rem; font-weight:700; }
.status-received { background:#dbeafe; color:#1d4ed8; }
.status-shipped { background:#fef3c7; color:#b45309; }
.status-delivered { background:#d1fae5; color:#047857; }

.btn { padding:6px 12px; border:none; border-radius:6px; font-family:inherit; font-weight:600; cursor:pointer; font-size:0.8rem; }
.btn-ship { background:var(--orange); color:#fff; }
.btn-deliver { background:var(--green); color:#fff; }
.btn-delete { background:#ef4444; color:#fff; }

.empty { padding:60px; text-align:center; color:#94a3b8; font-size:1.1rem; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ DB Dashboard</h1>
  <div class="header-right"><a href="/index.html">← Back to Store</a></div>
</div>

<div class="container">
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-title">Total Orders</div>
      <div class="stat-val" id="statOrders">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-val" id="statRev">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Pending Shipment</div>
      <div class="stat-val" id="statPending">0</div>
    </div>
  </div>

  <h2 style="margin-bottom:16px;color:var(--primary)">Live Orders Data</h2>
  
  <table class="orders-table">
    <thead>
      <tr>
        <th>Order ID / Time</th>
        <th>Customer & Address</th>
        <th>Items</th>
        <th>Payment</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- Data injected here -->
    </tbody>
  </table>
</div>

<script>
let orders = [];

function loadOrders() {
  orders = JSON.parse(localStorage.getItem('zeptoDbOrders') || '[]');
  renderDashboard();
}

function updateStatus(id, newStatus) {
  const o = orders.find(x => x.id === id);
  if(o) { o.status = newStatus; saveOrders(); }
}

function deleteOrder(id) {
  if(!confirm("Delete this order?")) return;
  orders = orders.filter(x => x.id !== id);
  saveOrders();
}

function saveOrders() {
  localStorage.setItem('zeptoDbOrders', JSON.stringify(orders));
  renderDashboard();
}

function renderDashboard() {
  const tbody = document.getElementById('tableBody');
  
  // Stats
  document.getElementById('statOrders').textContent = orders.length;
  document.getElementById('statRev').textContent = '₹' + orders.reduce((s,o)=>s+o.total,0);
  document.getElementById('statPending').textContent = orders.filter(o=>o.status==='Received').length;

  if(orders.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">No orders found in database. Place a test order!</td></tr>`;
    return;
  }

  tbody.innerHTML = orders.map(o => {
    let sClass = 'status-received';
    if(o.status === 'Shipped') sClass = 'status-shipped';
    if(o.status === 'Delivered') sClass = 'status-delivered';

    let actionBtns = '';
    if(o.status === 'Received') actionBtns += `<button class="btn btn-ship" onclick="updateStatus('${o.id}', 'Shipped')">Mark Shipped</button><br><br>`;
    if(o.status === 'Shipped') actionBtns += `<button class="btn btn-deliver" onclick="updateStatus('${o.id}', 'Delivered')">Mark Delivered</button><br><br>`;
    actionBtns += `<button class="btn btn-delete" onclick="deleteOrder('${o.id}')">Delete</button>`;

    const itemsHtml = o.items.map(i => `• ${i.name} (${i.qty}x)`).join('<br>');

    return `
      <tr>
        <td>
          <strong style="color:var(--blue)">${o.id}</strong><br>
          <span style="font-size:0.8rem;color:#64748b">${o.time}</span>
        </td>
        <td>
          <strong>${o.customer.name}</strong><br>
          📞 ${o.customer.phone}<br>
          <span style="font-size:0.85rem;color:#64748b">${o.customer.addr}</span>
        </td>
        <td style="font-size:0.85rem">${itemsHtml}</td>
        <td>
          <strong>₹${o.total}</strong><br>
          <span style="font-size:0.8rem">${o.method}</span><br>
          <span style="font-size:0.7rem;color:#94a3b8">${o.payId}</span>
        </td>
        <td><span class="status-badge ${sClass}">${o.status}</span></td>
        <td>${actionBtns}</td>
      </tr>
    `;
  }).join('');
}

// Check every 2 seconds for new orders (Simulating real-time DB)
setInterval(loadOrders, 2000);
loadOrders();
</script>
</body>
</html>
