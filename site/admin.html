<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purity Organic Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-light: #334155;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --danger: #ef4444;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
    
    /* Login Overlay */
    #login-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    
    .login-box {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 40px;
      border-radius: 24px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-glow);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .login-box h2 { font-size: 2rem; margin-bottom: 8px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }
    
    .input-group { position: relative; margin-bottom: 24px; text-align: left; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .input-group input, .input-group select, .input-group textarea {
      width: 100%; padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background: rgba(15, 23, 42, 0.9); }
    
    .btn {
      display: inline-flex; justify-content: center; align-items: center;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600; font-size: 1rem;
      cursor: pointer; border: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Outfit', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white; width: 100%;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-success { background: var(--accent); color: white; }
    .btn-success:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
    
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: var(--danger); color: white; }
    
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-light); color: var(--text); }
    
    /* Layout */
    .app-container { display: flex; min-height: 100vh; }
    
    .sidebar {
      width: 280px; background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      display: flex; flex-direction: column;
    }
    .brand { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 48px; display: flex; align-items: center; gap: 12px; }
    .brand span { background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .nav-item {
      padding: 14px 20px; border-radius: 12px;
      color: var(--text-muted); font-weight: 600; font-size: 1.05rem;
      cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
    .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .header h1 { font-size: 2.2rem; font-weight: 700; }
    
    /* Products Grid */
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: rgba(255, 255, 255, 0.2); }
    
    .product-img-wrapper { position: relative; height: 200px; width: 100%; overflow: hidden; background: #000; }
    .product-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: transform 0.5s ease; }
    .product-card:hover .product-img { transform: scale(1.05); opacity: 1; }
    
    .category-badge {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
      padding: 6px 12px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .product-info { padding: 24px; }
    .product-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
    .product-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .product-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .product-price { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: 'Outfit'; }
    .product-stock { font-size: 0.85rem; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
    .stock-in { background: rgba(16, 185, 129, 0.1); color: var(--accent); }
    .stock-out { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    
    .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card-actions button { padding: 10px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center; z-index: 2000;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
      border-radius: 24px; padding: 40px;
      transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.show .modal { transform: scale(1); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .modal-header h2 { font-size: 1.8rem; }
    .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
    .close-btn:hover { color: white; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    .full-width { grid-column: 1 / -1; }
    
    .modal-actions { display: flex; justify-content: flex-end; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--accent); color: white;
      padding: 14px 28px; border-radius: 30px;
      font-weight: 600; font-size: 0.95rem;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 3000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    
    /* Image Preview */
    .img-preview { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 16px; background: #000; display: none; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-light); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>Admin Portal</h2>
      <p>Enter your passcode to manage the catalog.</p>
      <div class="input-group">
        <label>Passcode</label>
        <input type="password" id="passcode" placeholder="Hint: 1234" onkeypress="if(event.key==='Enter') login()">
      </div>
      <button class="btn btn-primary" onclick="login()">Access Dashboard</button>
      <p id="login-err" style="color: var(--danger); margin-top: 16px; margin-bottom: 0; display: none; font-weight: 600;">Incorrect passcode.</p>
    </div>
  </div>

  <!-- Main App -->
  <div class="app-container" style="display: none;" id="app-container">
    <aside class="sidebar">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Purity Admin</span>
      </div>
      
      <div class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Catalog
      </div>
      <div class="nav-item" onclick="viewStore()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        View Store
      </div>
      <div class="nav-item" style="margin-top: auto; color: var(--danger);" onclick="logout()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Log Out
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <div>
          <h1>Product Catalog</h1>
          <p style="color: var(--text-muted); margin-top: 8px;">Manage your live inventory. Changes save instantly.</p>
        </div>
        <button class="btn btn-primary" style="width: auto; padding: 12px 24px;" onclick="openModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Add Product
        </button>
      </div>

      <div class="products-grid" id="adminGrid">
        <!-- Products injected here -->
      </div>
    </main>
  </div>

  <!-- Edit/Add Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Product</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      
      <img id="formImgPreview" class="img-preview" src="" alt="Preview">
      
      <div class="form-grid">
        <div class="input-group full-width">
          <label>Product Name</label>
          <input type="text" id="f_name" placeholder="e.g. Pure A2 Cow Ghee">
        </div>
        
        <div class="input-group">
          <label>Category</label>
          <select id="f_category">
            <option value="dairy">Dairy</option>
            <option value="spices">Spices</option>
          </select>
        </div>
        
        <div class="input-group">
          <label>Price (₹)</label>
          <input type="number" id="f_price" placeholder="650">
        </div>
        
        <div class="input-group">
          <label>Weight / Size</label>
          <input type="text" id="f_weight" placeholder="1 Litre">
        </div>
        
        <div class="input-group">
          <label>Stock Quantity</label>
          <input type="number" id="f_stock" placeholder="24">
        </div>
        
        
        <div class="input-group full-width">
          <label>Image URL or Upload JPG</label>
          <div style="display:flex; gap:10px;">
            <input type="text" id="f_image" placeholder="https://..." oninput="updatePreview()" style="flex:1;">
            <button class="btn btn-ghost" onclick="document.getElementById('f_image_file').click()">Upload JPG</button>
            <input type="file" id="f_image_file" accept="image/jpeg, image/jpg" style="display:none;" onchange="handleImageUpload(event)">
          </div>
        </div>

        
        <div class="input-group full-width">
          <label>Short Description</label>
          <textarea id="f_desc" rows="3" placeholder="Bilona-method, golden and aromatic."></textarea>
        </div>
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-success" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Saved successfully</div>

  <script src="products.js"></script>
  <script>
    let products = [];
    let editingId = null;

    // Load from memory (injected by products.js)
    function loadData() {
      if (typeof PRODUCTS !== 'undefined') {
        products = [...PRODUCTS];
      }
    }

    
    let currentAdminPassword = "";
    let pendingImageUploads = [];

    // Auth
    function login() {
      const code = document.getElementById('passcode').value.trim();
      if (code === 'owner123') { 
        currentAdminPassword = code;
        document.getElementById('login-overlay').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('login-overlay').style.display = 'none';
          document.getElementById('app-container').style.display = 'flex';
          loadData();
          renderGrid();
        }, 500);
      } else {
        document.getElementById('login-err').textContent = "Invalid Password!";
        document.getElementById('login-err').style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('app-container').style.display = 'none';
      document.getElementById('login-overlay').style.display = 'flex';
      setTimeout(() => { document.getElementById('login-overlay').style.opacity = '1'; }, 10);
      document.getElementById('passcode').value = '';
      document.getElementById('login-err').style.display = 'none';
    }

    // Render Grid
    function renderGrid() {
      const grid = document.getElementById('adminGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-img-wrapper">
            <span class="category-badge">${p.cat}</span>
            <img src="${p.img}" class="product-img" onerror="this.src='https://via.placeholder.com/500x500?text=No+Image'">
          </div>
          <div class="product-info">
            <h3 class="product-title">${p.name}</h3>
            <p class="product-desc">${p.hindi}</p>
            <div class="product-meta">
              <span class="product-price">₹${p.price} <strike style="color:#888; font-size:1rem; margin-left:6px;">₹${p.mrp}</strike></span>
              <span class="product-stock stock-in">${p.weight}</span>
            </div>
            <div class="card-actions">
              <button class="btn-ghost" onclick="openModal(${p.id})">Edit</button>
              <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Modal Logic
    function openModal(id = null) {
      editingId = id;
      document.getElementById('modalTitle').textContent = id ? 'Edit Product' : 'Add New Product';
      
      if (id) {
        const p = products.find(x => x.id === id);
        document.getElementById('f_name').value = p.name;
        document.getElementById('f_desc').value = p.hindi || '';
        document.getElementById('f_category').value = p.cat;
        document.getElementById('f_price').value = p.price;
        document.getElementById('f_stock').value = p.mrp || (p.price + 50); 
        document.getElementById('f_weight').value = p.weight;
        document.getElementById('f_image').value = p.img;
      } else {
        ['f_name', 'f_price', 'f_weight', 'f_stock', 'f_image', 'f_desc'].forEach(f => document.getElementById(f).value = '');
        document.getElementById('f_category').value = 'dairy';
      }
      
      updatePreview();
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      editingId = null;
    }

    
    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const base64String = event.target.result.split(',')[1];
        const filename = Date.now() + "_" + file.name;
        
        pendingImageUploads.push({
          filename: filename,
          base64: base64String
        });
        
        document.getElementById('f_image').value = 'images/' + filename;
        updatePreview();
      };
      reader.readAsDataURL(file);
    }

    function updatePreview() {
      const url = document.getElementById('f_image').value;
      const preview = document.getElementById('formImgPreview');
      if (url) {
        preview.style.display = 'block';
        preview.src = url;
      } else {
        preview.style.display = 'none';
      }
    }

    // CRUD
    async function saveProduct() {
      const p = {
        id: editingId || Date.now(),
        name: document.getElementById('f_name').value,
        hindi: document.getElementById('f_desc').value,
        cat: document.getElementById('f_category').value,
        price: Number(document.getElementById('f_price').value),
        mrp: Number(document.getElementById('f_stock').value),
        weight: document.getElementById('f_weight').value,
        img: document.getElementById('f_image').value,
        badges: editingId ? products.find(x => x.id === editingId).badges : [],
        rating: editingId ? products.find(x => x.id === editingId).rating : 5.0,
        reviews: editingId ? products.find(x => x.id === editingId).reviews : 0,
        tags: editingId ? products.find(x => x.id === editingId).tags : []
      };

      if (!p.name || !p.price) {
        alert("Name and Price are required!");
        return;
      }

      if (editingId) {
        const idx = products.findIndex(x => x.id === editingId);
        products[idx] = p;
      } else {
        products.push(p);
      }

      renderGrid();
      closeModal();
      
      showToast("Saving to GitHub... please wait.");
      await saveToGitHub();
    }

    async function deleteProduct(id) {
      if (confirm("Are you sure you want to delete this product?")) {
        products = products.filter(x => x.id !== id);
        renderGrid();
        showToast("Deleting from GitHub...");
        await saveToGitHub();
      }
    }

    function toBase64(str) {
      return window.btoa(unescape(encodeURIComponent(str)));
    }

    
    async function saveToGitHub() {
      try {
        const res = await fetch('/.netlify/functions/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: currentAdminPassword,
            products: products,
            imageUpdates: pendingImageUploads
          })
        });
        
        if (res.ok) {
          showToast("Successfully saved to GitHub! Deployment started.");
          pendingImageUploads = []; // Clear pending uploads
        } else {
          const errData = await res.json();
          alert("Deploy failed: " + errData.message);
        }
      } catch (err) {
        alert("Error saving to Netlify Function: " + err.message);
        console.error(err);
      }
    }


    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    function viewStore() {
      window.open('index.html', '_blank');
    }
  </script>
</body>
</html>
