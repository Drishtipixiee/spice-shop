<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Indian Dairy & Spices</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --saffron: #FF6B00; --gold: #FFC200; --red: #C0392B; --cream: #f8fafc;
      --dark: #0f172a; --text: #333; --gray: #666; --dairy-accent: #7c3aed;
      --dairy-dark: #5b21b6; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .login-container {
      background: #fff; width: 100%; max-width: 420px; border-radius: var(--radius);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 40px 30px; position: relative;
      overflow: hidden;
    }
    .login-header { text-align: center; margin-bottom: 30px; }
    .logo-icon { font-size: 2.5rem; margin-bottom: 10px; display: inline-block; }
    .login-header h2 { font-size: 1.5rem; color: var(--dark); font-weight: 700; }
    .login-header p { font-size: 0.9rem; color: var(--gray); margin-top: 5px; }
    
    .input-group { margin-bottom: 20px; position: relative; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
    .input-group input {
      width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .input-group input:focus { border-color: var(--dairy-accent); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); }
    .input-prefix { position: absolute; left: 16px; bottom: 15px; font-weight: 600; color: var(--dark); }
    .has-prefix input { padding-left: 50px; letter-spacing: 2px; font-weight: 600; }
    
    .btn-submit {
      width: 100%; background: linear-gradient(135deg, var(--dairy-accent), var(--dairy-dark));
      color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 1.05rem;
      font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4); }
    
    .otp-section { display: none; }
    .otp-inputs { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 20px; }
    .otp-inputs input {
      width: 50px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: 700;
      border: 2px solid #e2e8f0; border-radius: 12px;
    }
    .otp-inputs input:focus { border-color: var(--dairy-accent); }
    
    .divider { display: flex; align-items: center; text-align: center; margin: 24px 0; color: var(--gray); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
    .divider:not(:empty)::before { margin-right: 10px; }
    .divider:not(:empty)::after { margin-left: 10px; }
    
    .social-login {
      display: flex; gap: 12px; justify-content: center;
    }
    .btn-social {
      flex: 1; padding: 12px; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;
      color: var(--dark); cursor: pointer; transition: 0.2s;
    }
    .btn-social:hover { background: #f8fafc; border-color: #cbd5e1; }
    
    .terms { font-size: 0.75rem; color: var(--gray); text-align: center; margin-top: 24px; }
    .terms a { color: var(--dairy-accent); text-decoration: none; font-weight: 600; }
    
    .toast {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: #27ae60; color: white; padding: 12px 20px; border-radius: 8px; font-weight: 600;
      font-size: 0.9rem; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
      z-index: 10;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="toast" id="toast">OTP Sent Successfully!</div>
    
    <div class="login-header">
      <span class="logo-icon">🥛</span>
      <h2>Welcome Back</h2>
      <p>Log in to access your orders and fresh dairy</p>
    </div>

    <!-- PHONE NUMBER STEP -->
    <div id="step-phone">
      <div class="input-group has-prefix">
        <label>Phone Number</label>
        <span class="input-prefix">+91</span>
        <input type="tel" id="phoneInput" placeholder="98923 60874" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <button class="btn-submit" onclick="sendOTP()">Continue</button>
      
      <div class="divider">or</div>
      
      <div class="social-login">
        <button class="btn-social">✉️ Email</button>
        <button class="btn-social">🌐 Google</button>
      </div>
    </div>

    <!-- OTP VERIFICATION STEP -->
    <div id="step-otp" class="otp-section">
      <p style="text-align:center; font-size:0.9rem; color:var(--gray); margin-bottom:20px;">
        Enter the 4-digit OTP sent to <br><strong style="color:var(--dark)" id="displayPhone"></strong>
        <br><a href="#" onclick="goBack()" style="color:var(--dairy-accent); font-size:0.8rem; text-decoration:none;">Change Number</a>
      </p>
      
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-box" onkeyup="moveToNext(this, 1)">
        <input type="text" maxlength="1" class="otp-box" onkeyup="moveToNext(this, 2)">
        <input type="text" maxlength="1" class="otp-box" onkeyup="moveToNext(this, 3)">
        <input type="text" maxlength="1" class="otp-box" onkeyup="moveToNext(this, 4)">
      </div>
      
      <button class="btn-submit" onclick="verifyOTP()">Verify & Login</button>
      
      <p style="text-align:center; font-size:0.8rem; margin-top:20px; color:var(--gray);">
        Didn't receive code? <a href="#" style="color:var(--dairy-accent); font-weight:600; text-decoration:none;" onclick="sendOTP()">Resend</a>
      </p>
    </div>

    <div class="terms">
      By continuing, you agree to our <br>
      <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
    </div>
  </div>

  <script>
    let expectedOTP = '';

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#e74c3c' : '#27ae60';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function sendOTP() {
      const phone = document.getElementById('phoneInput').value;
      if(phone.length !== 10) {
        showToast('Enter valid 10-digit number', true);
        return;
      }
      
      // Simulate API call
      expectedOTP = Math.floor(1000 + Math.random() * 9000).toString();
      
      // FOR TESTING: Log OTP to console
      console.log("MOCK OTP SENT:", expectedOTP);

      // Simulate Real Telecom Gateway Loading
      const btn = document.querySelector('#step-phone .btn-submit');
      const originalText = btn.textContent;
      btn.innerHTML = '<span style="display:inline-block; animation: spin 1s linear infinite;">⏳</span> Connecting to Telecom Gateway...';
      btn.style.opacity = '0.8';
      
      setTimeout(() => {
        btn.innerHTML = '<span style="color:#27ae60">✅ SMS Dispatched to Carrier</span>';
        
        setTimeout(() => {
          document.getElementById('displayPhone').textContent = '+91 ' + phone;
          document.getElementById('step-phone').style.display = 'none';
          document.getElementById('step-otp').style.display = 'block';
          
          // Realistic fake phone overlay to show the SMS since we don't have Twilio API key for real SMS
          const phoneMock = document.createElement('div');
          phoneMock.style.cssText = "position:fixed; bottom:20px; right:20px; width:300px; background:#fff; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.2); padding:15px; border:4px solid #333; z-index:9999; animation: slideUp 0.5s ease; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;";
          phoneMock.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:10px;">
              <strong style="color:#333; font-size:0.9rem">Messages</strong>
              <span style="font-size:0.8rem; color:#888">Just now</span>
            </div>
            <div style="background:#eef2ff; padding:12px; border-radius:12px; font-size:0.95rem; color:#333;">
              Your Indian Dairy & Spices OTP is: <strong style="font-size:1.1rem; color:#4f46e5">${expectedOTP}</strong>. Do not share this code with anyone.
            </div>
            <div style="font-size:0.75rem; color:#888; text-align:center; margin-top:10px;">
              (Real SMS requires Twilio API Key - This is a test simulation)
            </div>
          `;
          document.body.appendChild(phoneMock);
          
          setTimeout(() => {
            phoneMock.style.opacity = '0';
            phoneMock.style.transition = 'opacity 1s';
            setTimeout(() => phoneMock.remove(), 1000);
          }, 10000);

          showToast('SMS sent successfully via simulated carrier');
          document.querySelectorAll('.otp-box')[0].focus();
        }, 1500);
      }, 2000);
    }

    function moveToNext(el, index) {
      if(el.value.length === 1 && index < 4) {
        document.querySelectorAll('.otp-box')[index].focus();
      }
    }

    function goBack() {
      document.getElementById('step-otp').style.display = 'none';
      document.getElementById('step-phone').style.display = 'block';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    }

    function verifyOTP() {
      const boxes = document.querySelectorAll('.otp-box');
      let entered = '';
      boxes.forEach(b => entered += b.value);
      
      if(entered === expectedOTP || entered === '7391') { // 7391 is secure master code for admin
        showToast('Login successful!');
        
        // Mock token logic
        const phone = document.getElementById('phoneInput').value;
        const isAdmin = phone === '9892360874' || entered === '7391';
        
        localStorage.setItem('token', 'simulated_jwt_token_123');
        localStorage.setItem('userPhone', phone);
        if(isAdmin) localStorage.setItem('isAdmin', 'true');
        
        setTimeout(() => {
          window.location.href = isAdmin ? 'admin.html' : 'index.html';
        }, 1000);
      } else {
        showToast('Invalid OTP', true);
        boxes.forEach(b => b.value = '');
        boxes[0].focus();
      }
    }
  </script>
</body>
</html>
