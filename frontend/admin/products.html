<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory | Enterprise Admin</title>
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <span style="color:var(--text-main)">Spice</span>Shop
  </div>
  <div class="sidebar-menu">
    <div class="menu-label">Main Menu</div>
    <a href="index.html" class="menu-item">📊 Dashboard</a>
    <a href="orders.html" class="menu-item">📦 Orders</a>
    <a href="products.html" class="menu-item active">📋 Products Inventory</a>
    <a href="settings.html" class="menu-item">⚙️ Site Settings</a>
    
    <div class="menu-label">Settings</div>
    <a href="#" onclick="api.logout()" class="menu-item">🚪 Logout</a>
  </div>
</aside>

<main class="main-wrapper">
  <header class="topbar">
    <div class="topbar-search">
      🔍 <input type="text" placeholder="Search inventory...">
    </div>
    <div class="topbar-right">
      <div class="admin-profile">
        <div class="admin-avatar">A</div>
        <div class="admin-info">
          <span class="admin-name">Admin User</span>
          <span class="admin-role">Super Admin</span>
        </div>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div class="page-header">
      <h1 class="page-title">Products Inventory</h1>
      <div class="page-actions">
        <button class="btn btn-outline" onclick="loadProducts()">🔄 Refresh</button>
        <button class="btn btn-primary" onclick="openModal()">+ Add New Product</button>
      </div>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Product Info</th>
              <th>Category</th>
              <th>Price (₹)</th>
              <th>MRP (₹)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr><td colspan="5" class="loader-wrapper"><div class="spinner"></div>Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="prodModal">
  <div class="modal-header">
    <h3 class="modal-title" id="modalTitle">Edit Product</h3>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="pId">
    
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Product Name (English)</label>
        <input type="text" id="pName" class="form-control" placeholder="e.g. Turmeric Powder">
      </div>
      <div class="form-group">
        <label class="form-label">Product Name (Hindi)</label>
        <input type="text" id="pNameHindi" class="form-control" placeholder="e.g. हल्दी पाउडर">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="pCat" class="form-control">
          <option value="1">Spices</option>
          <option value="2">Dairy</option>
          <option value="3">Combos</option>
          <option value="4">Cakes</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Weight/Size</label>
        <input type="text" id="pWeight" class="form-control" placeholder="e.g. 500g" value="1 pc">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Selling Price (₹)</label>
        <input type="number" id="pPrice" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">MRP (₹)</label>
        <input type="number" id="pMrp" class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Product Image (JPEG/JPG Photo or URL Link)</label>
      <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
        <input type="file" id="pImgFile" accept="image/jpeg, image/jpg" class="form-control" style="padding: 6px 12px; height: auto;">
        <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">OR</span>
        <input type="text" id="pImg" class="form-control" placeholder="Paste direct image URL..." style="flex: 1;">
      </div>
      <div id="uploadStatus" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Upload a JPEG/JPG photo from your gallery or paste a direct image URL.</div>
      
      <!-- Image Preview Container -->
      <div id="previewContainer" style="margin-top: 12px; display: none; text-align: center; border: 1px dashed var(--border); border-radius: 8px; padding: 12px; background: #fafbfc; position: relative;">
        <img id="pImgPreview" src="" style="max-height: 140px; max-width: 100%; border-radius: 6px; object-fit: cover; box-shadow: var(--shadow-sm);">
        <div style="margin-top: 8px;">
          <button type="button" class="btn btn-sm btn-danger" style="padding: 4px 10px; font-size: 0.75rem;" onclick="clearPreview()">Remove Photo</button>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-top: 12px; margin-bottom: 8px;">
      <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="pBestseller" style="width: 18px; height: 18px; cursor: pointer;">
        <label for="pBestseller" class="form-label" style="margin-bottom: 0; cursor: pointer; font-weight: 600;">⭐ Bestseller</label>
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="pNew" style="width: 18px; height: 18px; cursor: pointer;">
        <label for="pNew" class="form-label" style="margin-bottom: 0; cursor: pointer; font-weight: 600;">✨ New Arrival</label>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script>
let allProducts = [];

async function loadProducts() {
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = '<tr><td colspan="5" class="loader-wrapper"><div class="spinner"></div>Loading...</td></tr>';
  
  try {
    allProducts = await api.getProducts();
    if(allProducts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">No products found.</td></tr>';
      return;
    }

    tbody.innerHTML = allProducts.map(p => {
      let catBadge = 'badge-spice';
      let catText = 'Spices';
      if(p.category_id === 2) { catBadge = 'badge-dairy'; catText = 'Dairy'; }
      if(p.category_id === 3) { catBadge = 'badge-combo'; catText = 'Combos'; }
      if(p.category_id === 4) { catBadge = 'badge-cake'; catText = 'Cakes'; }

      return `
        <tr>
          <td>
            <div class="prod-cell">
              <img src="${p.image_url}" class="prod-img" onerror="this.src='https://via.placeholder.com/48x48?text=Product'">
              <div class="prod-meta">
                <strong>${p.name}</strong>
                <span style="font-size:0.8rem;color:var(--text-muted)">${p.weight || '1 pc'}</span>
              </div>
            </div>
          </td>
          <td><span class="badge ${catBadge}">${catText}</span></td>
          <td><strong>${formatMoney(p.price)}</strong></td>
          <td><strike style="color:var(--text-muted)">${formatMoney(p.mrp || p.price)}</strike></td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="openModal('${p.id}')">Edit</button>
          </td>
        </tr>
      `;
    }).join('');
  } catch (err) {
    console.error("Error loading products:", err);
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center;padding:40px;color:var(--danger)">
          <div style="font-weight:600;margin-bottom:8px;">⚠️ Failed to load products inventory.</div>
          <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">${err.message || "Network error or database unreachable."}</div>
          <button class="btn btn-sm btn-outline" onclick="loadProducts()">Try Again</button>
        </td>
      </tr>
    `;
  }
}

function openModal(id = null) {
  document.getElementById('modalTitle').textContent = id ? "Edit Product" : "Add New Product";
  
  // Clear any status messages
  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = "Upload a JPEG/JPG photo from your gallery or paste a direct image URL.";
  statusEl.style.color = "var(--text-muted)";
  document.getElementById('pImgFile').value = "";

  if(id) {
    const p = allProducts.find(x => x.id === id);
    document.getElementById('pId').value = p.id;
    document.getElementById('pName').value = p.name;
    document.getElementById('pNameHindi').value = p.name_hindi || '';
    document.getElementById('pCat').value = p.category_id;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pMrp').value = p.mrp || p.price;
    document.getElementById('pWeight').value = p.weight || '1 pc';
    document.getElementById('pImg').value = p.image_url;
    document.getElementById('pBestseller').checked = p.is_bestseller || false;
    document.getElementById('pNew').checked = p.is_new || false;
  } else {
    document.getElementById('pId').value = "";
    document.getElementById('pName').value = "";
    document.getElementById('pNameHindi').value = "";
    document.getElementById('pPrice').value = "";
    document.getElementById('pMrp').value = "";
    document.getElementById('pWeight').value = "1 pc";
    document.getElementById('pImg').value = "";
    document.getElementById('pBestseller').checked = false;
    document.getElementById('pNew').checked = false;
  }
  
  updatePreview();
  
  document.getElementById('overlay').classList.add('open');
  document.getElementById('prodModal').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('prodModal').classList.remove('open');
}

async function saveProduct() {
  const idStr = document.getElementById('pId').value;
  const payload = {
    name: document.getElementById('pName').value.trim(),
    name_hindi: document.getElementById('pNameHindi').value.trim(),
    category_id: parseInt(document.getElementById('pCat').value),
    price: parseInt(document.getElementById('pPrice').value),
    mrp: parseInt(document.getElementById('pMrp').value) || parseInt(document.getElementById('pPrice').value),
    weight: document.getElementById('pWeight').value.trim(),
    image_url: document.getElementById('pImg').value.trim(),
    is_bestseller: document.getElementById('pBestseller').checked,
    is_new: document.getElementById('pNew').checked,
    description: "Authentic Product"
  };
  
  if(!payload.name) { alert("Product name is required."); return; }
  if(!payload.image_url) { alert("Product photo (upload or link) is required."); return; }
  if(isNaN(payload.price) || payload.price <= 0) { alert("Please enter a valid selling price."); return; }
  
  try {
    await api.saveProduct(idStr || null, payload);
    closeModal();
    loadProducts();
  } catch(e) {
    alert("Failed to save product.");
  }
}

// Preview and upload functions
function updatePreview() {
  const urlVal = document.getElementById('pImg').value.trim();
  const previewImg = document.getElementById('pImgPreview');
  const previewContainer = document.getElementById('previewContainer');
  if (urlVal) {
    previewImg.src = urlVal;
    previewContainer.style.display = 'block';
  } else {
    previewContainer.style.display = 'none';
  }
}

function clearPreview() {
  document.getElementById('pImg').value = "";
  document.getElementById('pImgFile').value = "";
  updatePreview();
  const statusEl = document.getElementById('uploadStatus');
  statusEl.textContent = "Upload a JPEG/JPG photo from your gallery or paste a direct image URL.";
  statusEl.style.color = "var(--text-muted)";
}

function compressAndLoadImage(file) {
  return new Promise((resolve, reject) => {
    if (!file) return reject(new Error("No file selected"));
    
    // Validate image format strictly
    const validTypes = ['image/jpeg', 'image/jpg', 'image/pjpeg'];
    const extension = file.name.split('.').pop().toLowerCase();
    if (!validTypes.includes(file.type) && !['jpg', 'jpeg'].includes(extension)) {
      return reject(new Error("Please upload a JPG or JPEG photo only."));
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 400; // Keep base64 data URL size small
        const MAX_HEIGHT = 300;
        let width = img.width;
        let height = img.height;
        
        if (width > height) {
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
        } else {
          if (height > MAX_HEIGHT) {
            width *= MAX_HEIGHT / height;
            height = MAX_HEIGHT;
          }
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Compress as JPEG at 70% quality (excellent quality-to-size trade off)
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        resolve(dataUrl);
      };
      img.onerror = function() {
        reject(new Error("Invalid image format or corrupted file."));
      };
      img.src = e.target.result;
    };
    reader.onerror = function() {
      reject(new Error("Failed to read the file."));
    };
    reader.readAsDataURL(file);
  });
}

// Setup event listeners
document.addEventListener('DOMContentLoaded', () => {
  loadProducts();
  
  // URL Input Listener
  document.getElementById('pImg').addEventListener('input', updatePreview);
  
  // File Input Listener
  document.getElementById('pImgFile').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const statusEl = document.getElementById('uploadStatus');
    statusEl.textContent = "⏳ Reading and compressing image...";
    statusEl.style.color = "var(--primary)";
    
    try {
      const base64Str = await compressAndLoadImage(file);
      document.getElementById('pImg').value = base64Str;
      updatePreview();
      statusEl.textContent = "✅ Image loaded & compressed successfully.";
      statusEl.style.color = "var(--success)";
    } catch(err) {
      statusEl.textContent = `❌ ${err.message}`;
      statusEl.style.color = "var(--danger)";
      e.target.value = "";
    }
  });
});
</script>
</body>
</html>
